<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>GiguaT</title>
<style>
:root{--bg:#0a0a0f;--bg2:#12121a;--bg3:#1a1a2e;--border:#2a2a40;--text:#e0e0f0;--dim:#666688;--cyan:#00e5ff;--green:#00ff66;--red:#ff3355;--yellow:#ffcc00;--orange:#ff8800;--purple:#cc44ff;--blue:#3399ff;--pink:#ff44aa;--white:#f0f0ff;--radius:10px;--shadow:0 0 20px rgba(0,229,255,0.08)}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Segoe UI','Microsoft YaHei',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;overflow-x:hidden}
body::before{content:'';position:fixed;top:0;left:0;right:0;bottom:0;background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,0,0,0.03) 2px,rgba(0,0,0,0.03) 4px);pointer-events:none;z-index:999}
.avatar-frame{width:44px;height:44px;border-radius:12px;padding:2px;background:linear-gradient(135deg,#00e5ff,#8a5cff,#ffcc00);box-shadow:0 0 10px rgba(0,229,255,.35);flex:0 0 auto}
.avatar-frame img{width:100%;height:100%;border-radius:10px;object-fit:cover;display:block;background:#111827}
.avatar-frame-sm{width:28px;height:28px;border-radius:8px;padding:1px}
.top-avatar-frame{width:72px;height:72px;border-radius:16px;padding:2px}
.top-avatar-frame.gold{background:linear-gradient(135deg,#ffd700,#ffaa00,#ffd700)}
.top-avatar-frame.silver{background:linear-gradient(135deg,#c0c0c0,#e8e8e8,#c0c0c0)}
.top-avatar-frame.bronze{background:linear-gradient(135deg,#cd7f32,#e8a860,#cd7f32)}

#app{max-width:1100px;margin:0 auto;padding:10px 15px}
header{display:flex;align-items:center;justify-content:space-between;padding:10px 16px;background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);margin-bottom:8px;box-shadow:var(--shadow)}
header .logo{font-size:20px;font-weight:900;letter-spacing:1px}
header .logo s1{color:var(--cyan)}header .logo s2{color:var(--purple)}
header .hdr-btns{display:flex;gap:8px;align-items:center}
main{display:flex;gap:8px}
#left-rail{width:250px;min-width:250px;display:flex;flex-direction:column;gap:8px}
#sidebar{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);padding:10px;box-shadow:var(--shadow)}
#content{flex:1;background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);padding:16px;min-height:460px;box-shadow:var(--shadow)}
#log-area{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);padding:8px 14px;margin-top:8px;max-height:130px;overflow-y:auto;font-size:12px;color:var(--dim);box-shadow:var(--shadow)}
#announce-bar{background:var(--bg3);border:1px solid var(--border);border-radius:6px;padding:6px 10px;font-size:11px;max-height:38px;overflow:hidden;display:block}
#chat-panel{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);display:block;box-shadow:var(--shadow);overflow:hidden}
#chat-head{display:flex;justify-content:space-between;gap:6px;align-items:center;padding:6px 8px;background:var(--bg3);border-bottom:1px solid var(--border)}
#chat-msgs{height:155px;overflow-y:auto;padding:6px 8px;font-size:11px;line-height:1.45}
#chat-compose{display:flex;padding:6px 8px;gap:5px;border-top:1px solid var(--border);background:var(--bg3)}
#social-panel{margin-top:8px;display:flex;flex-direction:column;gap:8px}
.btn{display:inline-block;padding:7px 16px;border:none;border-radius:6px;font-size:13px;font-weight:600;cursor:pointer;transition:all .2s;text-decoration:none;text-align:center}
.btn:hover{transform:translateY(-1px);box-shadow:0 4px 15px rgba(0,0,0,.3)}
.btn:active{transform:translateY(0)}
.btn-c{background:linear-gradient(135deg,#006688,#0099aa);color:#fff}
.btn-g{background:linear-gradient(135deg,#006633,#009944);color:#fff}
.btn-r{background:linear-gradient(135deg,#661122,#993333);color:#fff}
.btn-p{background:linear-gradient(135deg,#441166,#6633aa);color:#fff}
.btn-o{background:linear-gradient(135deg,#884400,#aa6600);color:#fff}
.btn-sm{padding:4px 10px;font-size:11px}.btn-lg{padding:11px 24px;font-size:15px}.btn-block{display:block;width:100%;margin:3px 0}
.card{background:var(--bg3);border:1px solid var(--border);border-radius:8px;padding:10px;margin:5px 0}
.cp-badge{display:inline-flex;align-items:center;gap:5px;padding:4px 9px;border-radius:7px;border:1px solid rgba(255,204,0,.55);background:linear-gradient(135deg,rgba(255,204,0,.18),rgba(255,136,0,.1));color:var(--yellow);font-weight:900;text-shadow:0 0 10px rgba(255,204,0,.45);box-shadow:0 0 16px rgba(255,204,0,.16)}
.cp-badge b{font-size:15px;color:#ffe680}
.rating-badge{display:inline-flex;align-items:center;gap:5px;padding:3px 8px;border-radius:7px;border:1px solid rgba(0,229,255,.45);background:linear-gradient(135deg,rgba(0,229,255,.15),rgba(51,153,255,.08));color:var(--cyan);font-weight:800;box-shadow:0 0 14px rgba(0,229,255,.12)}
.match-wait{min-height:260px;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center}
.wait-ring{width:58px;height:58px;border-radius:50%;border:4px solid rgba(0,229,255,.18);border-top-color:var(--cyan);animation:spin .9s linear infinite;margin-bottom:14px}
.ko-gray{filter:grayscale(1) brightness(.48);opacity:.55;transition:filter .45s,opacity .45s,transform .45s;transform:scale(.96)}
.q-glow-3,.q-glow-4,.q-glow-5{text-shadow:0 0 8px currentColor,0 0 18px currentColor}
.q-glow-4{filter:drop-shadow(0 0 6px rgba(255,136,0,.65))}
.q-glow-5{animation:rareGlow 1.8s ease-in-out infinite}
.enemy-stat-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:5px;max-width:420px;margin:8px auto}
.enemy-stat-grid .sr{background:rgba(255,255,255,.03);border:1px solid var(--border);border-radius:6px;padding:4px 6px}
.sr{display:flex;justify-content:space-between;padding:2px 0;font-size:12px}
.sl{color:var(--dim)}.sv{font-weight:600}
.bw{background:#1a1a30;border-radius:4px;height:14px;margin:3px 0;overflow:hidden}
.bf{height:100%;border-radius:4px;transition:width .5s}
.sep{height:1px;background:var(--border);margin:8px 0}
h2{font-size:17px;margin-bottom:8px;color:var(--cyan)}
h3{font-size:14px;color:var(--yellow);margin:6px 0}
.mgrid{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.mi{background:var(--bg3);border:2px solid var(--border);border-radius:10px;padding:16px;cursor:pointer;transition:all .25s;text-align:center}
.mi:hover{border-color:var(--cyan);transform:translateY(-2px);box-shadow:0 0 20px rgba(0,229,255,.15)}
.mi .ic{font-size:32px;margin-bottom:6px}.mi .tt{font-size:15px;font-weight:700;color:var(--white)}.mi .ds{font-size:11px;color:var(--dim)}

/* 战斗GIF */
.enemy-gif-wrap{text-align:center;margin:8px 0}
.enemy-gif-wrap img{max-width:120px;max-height:120px;border-radius:12px;border:2px solid var(--border)}
.enemy-gif-wrap .enemy-name{font-weight:700;font-size:14px;margin-top:4px}
.dialogue-bubble{display:inline-block;background:var(--bg3);border:1px solid var(--cyan);border-radius:10px;padding:6px 14px;font-size:12px;color:var(--cyan);margin:4px 0;max-width:280px;animation:fadeIn .3s}

/* 战斗 */
.battle-top{display:flex;gap:12px;margin-bottom:10px;align-items:flex-start}
.battle-vs{flex:1}
#battle-canvas-wrap{background:var(--bg3);border:1px solid var(--border);border-radius:8px;text-align:center;padding:4px}
.action-row{display:flex;gap:10px;margin-top:12px;justify-content:center}

/* 武器/装备卡片 */
.wgrid{display:grid;grid-template-columns:1fr 1fr;gap:7px}
.wcard{background:var(--bg3);border:2px solid var(--border);border-radius:8px;padding:8px;cursor:pointer;transition:all .2s;font-size:12px}
.wcard:hover{border-color:var(--cyan);transform:translateY(-1px)}
.wcard.eq{border-color:var(--green);background:#0a1a10}
.wcard .wn{font-weight:700;font-size:13px}.wcard .ws{color:var(--dim);font-size:10px;margin:3px 0}.wcard .wp{font-weight:600}

/* 强化 */
.enhance-card{text-align:center;padding:16px}
.enhance-card .cur{font-size:26px;font-weight:900;color:var(--yellow)}
.enhance-card .stones{font-size:13px;color:var(--dim);margin:6px 0}

/* 弹窗 */
.mo{display:none;position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.7);z-index:1000;justify-content:center;align-items:center}
.mo.sh{display:flex}
.modal{background:var(--bg2);border:2px solid var(--border);border-radius:12px;padding:20px;max-width:460px;width:90%;box-shadow:0 0 40px rgba(0,0,0,.5);text-align:center}

/* 日志 */
.le{padding:2px 0;font-size:11px}.le.pl{color:var(--cyan)}.le.en{color:var(--red)}.le.cr{font-weight:700;color:var(--yellow)}.le.dl{color:var(--purple)}

@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.fade-in{animation:fadeIn .3s ease}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.5}}
.pulse{animation:pulse .4s ease 3}
@keyframes critFlash{0%{filter:brightness(2)}100%{filter:brightness(1)}}
.crit-flash{animation:critFlash .3s ease}
@keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-4px)}75%{transform:translateX(4px)}}
.shake{animation:shake .3s ease}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes rareGlow{0%,100%{filter:drop-shadow(0 0 4px rgba(255,68,68,.55))}50%{filter:drop-shadow(0 0 16px rgba(255,68,68,.95))}}


.avatar-frame{width:44px;height:44px;border-radius:12px;padding:2px;background:linear-gradient(135deg,#00e5ff,#8a5cff,#ffcc00);box-shadow:0 0 10px rgba(0,229,255,.35);display:flex;align-items:center;justify-content:center;overflow:hidden;flex:0 0 auto}.avatar-frame img{display:block;background:#111827}.top-avatar-frame{width:86px;height:86px;border-radius:20px}.top-avatar-frame img{border-radius:18px}
.danger-mid{filter:sepia(0.6) hue-rotate(-20deg) saturate(1.5)}
.danger-high{filter:sepia(0.9) hue-rotate(-30deg) saturate(2);animation:shake .3s ease infinite}

@media(max-width:800px){
  main{flex-direction:column}
  #left-rail{width:100%;min-width:unset}
  #chat-msgs{height:130px}
  .wgrid,.mgrid{grid-template-columns:1fr}
  #app{max-width:100%;padding:6px 8px}
  header{flex-wrap:wrap;gap:4px;padding:8px 10px}
  header .logo{font-size:16px}
  .hdr-btns{gap:4px}
  .btn-sm{padding:6px 12px;font-size:12px}
  .btn{padding:8px 14px;font-size:13px}
  #content{padding:10px;min-height:340px}
  h2{font-size:15px}
  h3{font-size:13px}
  .card{padding:8px;margin:4px 0}
  .mi .ic{font-size:24px}
  .mi .tt{font-size:13px}
  .mi{padding:12px 8px}
  .card-flip{width:70px!important;height:100px!important}
  .card-flip .card-front{font-size:24px!important}
  .card-flip .card-back{font-size:10px!important;padding:3px!important}
  .card-flip .card-back button{font-size:8px!important;padding:2px 4px!important}
  .enemy-stat-grid{grid-template-columns:repeat(2,1fr)}
  .enemy-gif-wrap img{max-width:80px;max-height:80px}
  .modal{max-width:95vw;padding:14px}
  .battle-top{flex-direction:column}
  .avatar-frame{width:36px;height:36px}
  .top-avatar-frame{width:56px;height:56px}
  .avatar-frame img{border-radius:8px}
  #social-panel{display:flex;flex-direction:column;gap:4px}
  #announce-bar{font-size:10px;max-height:32px}
  #chat-msgs{font-size:10px}
  #chat-compose input{font-size:10px;padding:4px}
  #chat-compose button{font-size:10px;padding:4px 8px}
  .action-row{flex-wrap:wrap;gap:6px}
  .action-row button{flex:1;min-width:60px;font-size:12px}
  #chat-panel.mobile-collapsed #chat-msgs{display:none}
  #chat-panel.mobile-collapsed #chat-compose{display:none}
  #btn-chat-toggle{display:inline-block!important}
}
/* 翻牌系统 */
.reward-grid{display:flex;gap:10px;justify-content:center;flex-wrap:nowrap;margin:12px 0}
.reward-card{width:100px;height:140px;perspective:600px;cursor:pointer;flex-shrink:0}
.reward-card-inner{position:relative;width:100%;height:100%;transition:transform 0.4s;transform-style:preserve-3d}
.reward-card.flipped .reward-card-inner{transform:rotateY(180deg)}
.reward-card-front{position:absolute;width:100%;height:100%;backface-visibility:hidden;background:linear-gradient(135deg,#1a1a2e,#2a2a40);border:2px solid #3a3a5a;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:30px;box-shadow:0 0 10px rgba(100,100,180,.15)}
.reward-card-back{position:absolute;width:100%;height:100%;backface-visibility:hidden;transform:rotateY(180deg);background:linear-gradient(135deg,#12122a,#1a1a3e);border-radius:10px;display:flex;flex-direction:column;align-items:center;justify-content:center;font-size:12px;padding:5px;text-align:center;border:2px solid #3a3a5a;box-shadow:0 0 15px rgba(100,100,200,.2)}
.reward-icon{font-size:20px;margin-bottom:2px}
.reward-name{font-weight:700;margin:3px 0;font-size:11px;line-height:1.2}
.reward-n{color:var(--dim);font-size:10px}
.reward-quality{font-size:9px;margin-top:2px}
.reward-card.missed{opacity:.3;filter:grayscale(.8);pointer-events:none}
#btn-auto{background:linear-gradient(135deg,#444,#666)}
#btn-auto.active{background:linear-gradient(135deg,#ff6600,#ff8800);animation:pulse 1s infinite}
@keyframes flipIn{0%{transform:rotateY(0)}100%{transform:rotateY(180deg)}}
@keyframes jarShake{0%,100%{transform:rotate(0)}25%{transform:rotate(-12deg)}75%{transform:rotate(12deg)}}
@media(max-width:800px){
  .reward-grid{display:grid;grid-template-columns:repeat(2,100px);justify-content:center;gap:12px}
  .reward-card{width:100px;height:140px}
  #btn-chat-toggle{display:inline-block!important}
}
/* ═══ 星蚀试炼塔 kiwi GIF 样式 ═══ */
.kiwi-enemy{width:96px;height:96px;object-fit:contain;image-rendering:auto;transition:transform .25s ease,filter .25s ease}
.kiwi-enemy.attack{animation:kiwiAttack .35s ease}
@keyframes kiwiAttack{0%{transform:translateX(0) scale(1)}50%{transform:translateX(-12px) scale(1.08)}100%{transform:translateX(0) scale(1)}}
.final-kiwi-boss{width:140px;height:140px;filter:hue-rotate(var(--kiwi-hue,280deg)) saturate(2) contrast(1.25) drop-shadow(0 0 18px #b000ff);animation:bossPulse 1.2s infinite alternate}
@keyframes bossPulse{from{transform:scale(1)}to{transform:scale(1.06)}}
.rogue-enemy-wrap{display:flex;flex-direction:column;align-items:center;margin:10px 0}
.rogue-enemy-wrap .enemy-name{color:var(--red);font-weight:bold;margin-top:4px}
</style>
</head>
<body>
<!-- ═══ 登录/注册遮罩 ═══ -->
<div id="login-overlay" style="position:fixed;top:0;left:0;right:0;bottom:0;background:var(--bg);z-index:10000;display:flex;align-items:center;justify-content:center">
<div style="background:var(--bg2);border:1px solid var(--border);border-radius:16px;padding:30px 24px;width:340px;max-width:90vw;text-align:center;box-shadow:0 0 40px rgba(0,229,255,.12)">
  <div style="font-size:28px;font-weight:900;margin-bottom:4px"><s1 style="color:var(--cyan)">GiguaT</s1></div>
  <div style="font-size:11px;color:var(--dim);margin-bottom:18px">一人一号，存档不丢</div>
  <input id="login-user" placeholder="用户名" style="width:100%;padding:10px;margin:6px 0;background:var(--bg3);color:var(--text);border:1px solid var(--border);border-radius:8px;font-size:14px">
  <input id="login-pass" type="password" placeholder="密码" style="width:100%;padding:10px;margin:6px 0;background:var(--bg3);color:var(--text);border:1px solid var(--border);border-radius:8px;font-size:14px">
  <input id="login-pass2" type="password" placeholder="确认密码" style="width:100%;padding:10px;margin:6px 0;background:var(--bg3);color:var(--text);border:1px solid var(--border);border-radius:8px;font-size:14px;display:none">
  <div id="login-err" style="color:var(--red);font-size:11px;min-height:18px;margin:4px 0"></div>
  <button class="btn btn-c btn-block" onclick="doLogin()" id="btn-login" style="margin:4px 0;font-size:14px">登 录</button>
  <button class="btn btn-g btn-block" onclick="doRegister()" id="btn-register" style="margin:4px 0;font-size:14px;display:none">注 册</button>
  <div style="margin-top:12px;font-size:11px;color:var(--dim)">
    <span id="toggle-hint">没有账号？</span>
    <a href="#" onclick="toggleLoginMode();return false" style="color:var(--cyan);text-decoration:none" id="toggle-link">注册</a>
  </div>
</div></div>
<div id="app">
<header>
  <div class="logo"><s1>GiguaT</s1></div>
  <div class="hdr-btns">
    <span id="hdr-user" style="font-size:10px;color:var(--cyan);margin-right:6px"></span>
    <button class="btn btn-sm btn-c" onclick="goBack()" id="btn-back" style="display:none">← 返回</button>
    <button class="btn btn-sm btn-c" onclick="saveGame()">💾 保存</button>
    <button class="btn btn-sm btn-r" onclick="doLogout()" style="font-size:9px">🚪</button>
  </div>
</header>
<main><div id="left-rail"><div id="sidebar"></div></div><div id="content"><div style="text-align:center;padding:60px 20px;color:var(--dim)"><div style="font-size:32px;margin-bottom:12px">⚡</div><div id="content-status">正在连接服务器…</div></div></div></main>
<div id="social-panel"><div id="announce-bar">公告加载中…</div><div id="chat-panel">
  <div id="chat-head"><span style="font-size:11px;font-weight:700">💬 公屏聊天</span><div style="display:flex;gap:4px;align-items:center"><select id="chat-ch" onchange="loadChat()" style="background:var(--bg3);color:var(--text);border:1px solid var(--border);font-size:10px;padding:2px"><option value="all">全部</option><option value="world">world</option><option value="arena">arena</option><option value="dungeon">dungeon</option><option value="pot">pot</option><option value="enhance">enhance</option></select><button class="btn btn-sm btn-c" onclick="toggleMobileChat()" id="btn-chat-toggle" style="font-size:9px;display:none">▼</button></div></div>
  <div id="chat-msgs"></div>
  <div id="chat-compose"><input id="chat-input" placeholder="输入…" style="flex:1;min-width:0;background:var(--bg2);color:var(--text);border:1px solid var(--border);padding:5px;font-size:11px;border-radius:4px" onkeydown="if(event.key=='Enter')sendChat()"><button class="btn btn-sm btn-c" onclick="sendChat()" style="font-size:10px">发送</button></div>
</div></div>
<div id="log-area"></div>
</div>
<div class="mo" id="mo"><div class="modal" id="mc"></div></div>

<script>
const A='';let player=null,battle=null,enemyData=null,cur='menu';
let dungeonData=null,dungeonStage=0;
let loginUser=''; let sessionToken=localStorage.getItem('giguat_token')||''; // 持久化token

// ═══════════════ 登录/注册 ═══════════════
let loginMode='login';
function toggleLoginMode(){
  loginMode=loginMode==='login'?'register':'login';
  document.getElementById('login-pass2').style.display=loginMode==='register'?'block':'none';
  document.getElementById('btn-login').style.display=loginMode==='login'?'block':'none';
  document.getElementById('btn-register').style.display=loginMode==='register'?'block':'none';
  document.getElementById('toggle-hint').textContent=loginMode==='login'?'没有账号？':'已有账号？';
  document.getElementById('toggle-link').textContent=loginMode==='login'?'注册':'登录';
  document.getElementById('login-err').textContent='';
}
async function doLogin(){
  const u=document.getElementById('login-user').value.trim();
  const p=document.getElementById('login-pass').value.trim();
  const err=document.getElementById('login-err');
  if(!u||!p){err.textContent='请输入用户名和密码';return}
  err.textContent='登录中…';err.style.color='var(--dim)';
  const r=await api('/api/auth/login',{username:u,password:p});
  err.style.color='var(--red)';
  if(r.offline){err.textContent='网络连接失败，请检查网络';return}
  if(!r.ok){err.textContent=r.error||'登录失败';return}
  loginUser=r.username; sessionToken=r.token||''; localStorage.setItem('giguat_token',sessionToken);
  document.getElementById('login-overlay').style.display='none';
  document.getElementById('hdr-user').textContent='👤 '+loginUser;
  player=r.player;smm();
}
async function doRegister(){
  const u=document.getElementById('login-user').value.trim();
  const p=document.getElementById('login-pass').value.trim();
  const p2=document.getElementById('login-pass2').value.trim();
  const err=document.getElementById('login-err');
  if(!u||u.length<2){err.textContent='用户名至少2个字符';return}
  if(!p||p.length<3){err.textContent='密码至少3个字符';return}
  if(p!==p2){err.textContent='两次密码不一致';return}
  err.textContent='注册中…';err.style.color='var(--dim)';

// ═══════════════ 统一页面导航 / 返回上一层 ═══════════════
// 旧版返回按钮写死 screenMainMenu()，所以任何页面都会直接回主菜单。
// 现在所有页面进入用 enterPage()，返回用 goBack()，支持真正回上一层。
const pageStack=[];
let navPushEnabled=true;
function setBackVisible(){const b=document.getElementById('btn-back');if(b)b.style.display=(cur==='menu'?'none':'inline-block')}
function enterPage(pageId){
  const prev=cur||'menu';
  if(navPushEnabled && prev && prev!==pageId && pageId!=='menu') pageStack.push(prev);
  cur=pageId;setBackVisible();
}
function resetToMainPage(){cur='menu';pageStack.length=0;setBackVisible()}
function clearBattleLikeState(){battle=null;enemyData=null;dungeonData=null;dungeonStage=0}
function goBack(){
  try{
    if(document.getElementById('mo')?.classList.contains('sh')){closeModal();return}
    if((cur==='battle'||cur==='bot_battle_fight') && battle){
      if(!confirm('当前对战还未结束，确定退出吗？')) return;
      clearBattleLikeState();
    }
    const prev=pageStack.pop() || 'menu';
    routeToPage(prev,false);
  }catch(e){
    console.error('goBack error:',e);
    addLog('⚠️ 导航出错，已返回主菜单','dl');
    resetToMainPage();smm();
  }
}
function routeToPage(pageId,push=false){
  const old=navPushEnabled;navPushEnabled=push;
  try{
    if(pageId==='menu') return smm();
    if(pageId==='pvp') return spvp();
    if(pageId==='inventory') return sinv();
    if(pageId==='dungeon') return sd();
    if(pageId==='shop') return ss();
    if(pageId==='equip_shop') return ses();
    if(pageId==='enhance') return se();
    if(pageId==='info') return si();
    if(pageId==='angel') return sangel();
    if(pageId==='leaderboard') return slb();
    if(pageId==='botbattle') return sbotbattle();
    addLog(`⚠️ 未知页面 ${pageId}，返回主菜单`,'dl');
    return smm();
  }catch(e){
    console.error('routeToPage error:',e,pageId);
    addLog('⚠️ 页面加载失败，返回主菜单','dl');
    resetToMainPage();smm();
  }finally{navPushEnabled=old;}
}
function normalizeImgSrc(src){
  if(!src) return '/picture/defaults/default_avatar.png';
  const s=String(src).replace(/\\/g,'/');
  if(/^https?:\/\//i.test(s)||s.startsWith('data:')||s.startsWith('/')) return s;
  return '/'+s.replace(/^\.?\//,'');
}
function avatarImg(src,cls='',style=''){
  const s=normalizeImgSrc(src);
  return `<img class="${cls}" src="${s}" onerror="this.src='/picture/defaults/default_avatar.png'" style="object-fit:cover;${style}">`;
}

async function api(u,d=null){
  const h={'Content-Type':'application/json'};
  if(sessionToken)h['X-Session-Token']=sessionToken;
  const o=d?{method:'POST',headers:h,body:JSON.stringify(d)}:{headers:h};
  try{
    const res=await fetch(A+u,o);
    const text=await res.text();
    try{
      const data=JSON.parse(text);
      // 后端返回的JSON错误（如密码错误、用户名不存在）原样传递
      if(!res.ok && data.ok===undefined) data.ok=false;
      return data;
    }catch(pe){
      // 非JSON响应（HTML错误页等）
      console.error(`API ${res.status} ${u}: non-JSON response`);
      addLog(`⚠️ 服务器异常(${res.status})，请刷新`,'en');
      return {ok:false,error:`服务器返回异常 (${res.status})`,status:res.status};
    }
  }catch(e){
    console.error(`API offline ${u}:`,e.message||e);
    return {ok:false,error:'网络连接失败',offline:true};
  }
}

function dbf(){const cv=document.getElementById('battle-canvas');if(!cv||!battle)return;
  const ctx=cv.getContext('2d');const w=cv.width,h=cv.height;ctx.clearRect(0,0,w,h);ctx.fillStyle='#0a0a14';ctx.fillRect(0,0,w,h);
  ctx.strokeStyle='#2a2a40';ctx.lineWidth=2;ctx.beginPath();ctx.moveTo(0,h-25);ctx.lineTo(w,h-25);ctx.stroke();
  const px=80,ex=80+Math.min(500,battle.distance*3.5);
  ctx.fillStyle='#00ff66';ctx.beginPath();ctx.arc(px,h-32,12,0,Math.PI*2);ctx.fill();ctx.fillStyle='#fff';ctx.font='bold 10px "Microsoft YaHei"';ctx.textAlign='center';ctx.fillText('你',px,h-48);
  ctx.fillStyle='#ff3355';ctx.beginPath();ctx.arc(ex,h-32,12,0,Math.PI*2);ctx.fill();ctx.fillText(enemyData.name||'敌',ex,h-48);
  ctx.strokeStyle='#333355';ctx.setLineDash([4,6]);ctx.beginPath();ctx.moveTo(px+12,h-32);ctx.lineTo(ex-12,h-32);ctx.stroke();ctx.setLineDash([]);
  ctx.fillStyle='#00e5ff';ctx.font='11px "Microsoft YaHei"';ctx.fillText(battle.distance+'m',(px+ex)/2,h-36);
  if(battle.wind!==0){const cx=(px+ex)/2;ctx.fillStyle=battle.wind>0?'#00e5ff':'#cc44ff';ctx.fillText((battle.wind>0?'→→':'←←')+Math.abs(battle.wind),cx-25,h-62)}
  const hpw=50;const pr=battle.player_hp/player.maxhp;ctx.fillStyle='#1a1a30';ctx.fillRect(px-hpw/2,h-70,hpw,6);ctx.fillStyle=pr>.6?'#00ff66':(pr>.3?'#ffcc00':'#ff3355');ctx.fillRect(px-hpw/2,h-70,hpw*pr,6);
  const er=battle.enemy_hp/enemyData.maxhp;ctx.fillStyle='#1a1a30';ctx.fillRect(ex-hpw/2,h-70,hpw,6);ctx.fillStyle=er>.6?'#00ff66':(er>.3?'#ffcc00':'#ff3355');ctx.fillRect(ex-hpw/2,h-70,hpw*er,6)}

function animShot(){const cv=document.getElementById('battle-canvas');if(!cv||!battle)return;
  const ctx=cv.getContext('2d');const w=cv.width,h=cv.height;const px=80,ex=80+Math.min(500,battle.distance*3.5);let t=0;
  function f(){t+=.04;if(t>1){dbf();return}dbf();const x=px+(ex-px)*t;const y=h-32-50*Math.sin(t*Math.PI);ctx.fillStyle='#ffcc00';ctx.beginPath();ctx.arc(x,y,4,0,Math.PI*2);ctx.fill();ctx.fillStyle='rgba(255,200,0,.3)';ctx.beginPath();ctx.arc(x,y,8,0,Math.PI*2);ctx.fill();requestAnimationFrame(f)}requestAnimationFrame(f)}

// ═══════════════ 自动战斗 ═══════════════
let autoBattle=false;let autoTimer=null;
function toggleAuto(){
  autoBattle=!autoBattle;
  const btn=document.getElementById('btn-auto');
  if(autoBattle){
    btn.textContent='⏹ 停止自动';btn.classList.add('active');
    addLog('🤖 已开启自动战斗');
    autoStep();
  }else{
    btn.textContent='🤖 自动战斗';btn.classList.remove('active');
    if(autoTimer)clearTimeout(autoTimer);autoTimer=null;
    addLog('🤖 已停止自动战斗');
  }
}
function autoStep(){
  if(!autoBattle||!battle){autoTimer=null;return}
  if(battle.player_hp<=0||battle.enemy_hp<=0){
    autoBattle=false;autoTimer=null;
    const btn=document.getElementById('btn-auto');
    if(btn){btn.textContent='🤖 自动战斗';btn.classList.remove('active')}
    return;
  }
  const btn=document.getElementById('btn-fire');
  if(!btn||btn.disabled){autoTimer=setTimeout(autoStep,500);return}
  pa().finally(()=>{
    if(autoBattle)autoTimer=setTimeout(autoStep,1000+Math.random()*500);
  });
}

function flipCard(i){
  const card=document.getElementById('card-'+i);
  if(!card)return;
  if(card.dataset.flipped==='1')return;
  if(flippedCardCount>=2)return;
  card.dataset.flipped='1';flippedCardCount++;
  card.classList.add('flipped');
  const tip=document.getElementById('flip-tip');if(tip)tip.textContent=`已翻 ${flippedCardCount}/2 张`;
  if(flippedCardCount>=2){
    for(let j=0;j<5;j++){
      const c=document.getElementById('card-'+j);
      if(c&&c.dataset.flipped!=='1'){c.classList.add('missed');c.title='已错过'}
    }
  }
}

function flipRandomTwo(){
  const ids=[0,1,2,3,4].sort(()=>Math.random()-.5);
  for(const i of ids){if(flippedCardCount>=2)break;flipCard(i)}
}

function animShotEx(dmg,crit){
  const cv=document.getElementById('battle-canvas');if(!cv||!battle)return;
  const ctx=cv.getContext('2d');const w=cv.width,h=cv.height;
  const px=80,ex=80+Math.min(500,battle.distance*3.5);let t=0;
  // 蓄力闪光
  ctx.fillStyle='rgba(255,200,0,.2)';ctx.beginPath();ctx.arc(px,h-32,20,0,Math.PI*2);ctx.fill();
  function f(){
    t+=.03;if(t>1){
      dbf();
      // 伤害数字
      const rect=cv.getBoundingClientRect();
      showDamage(rect.left+ex,rect.top+h-80,dmg,crit);
      if(crit){document.getElementById('content').classList.add('crit-flash');setTimeout(()=>document.getElementById('content').classList.remove('crit-flash'),400)}
      return}
    dbf();
    // 飞行弹道+尾迹
    const x=px+(ex-px)*t;const y=h-32-50*Math.sin(t*Math.PI);
    ctx.fillStyle='#ffcc00';ctx.beginPath();ctx.arc(x,y,4,0,Math.PI*2);ctx.fill();
    ctx.fillStyle='rgba(255,200,0,.3)';ctx.beginPath();ctx.arc(x,y,8,0,Math.PI*2);ctx.fill();
    // 爆炸终点
    if(t>.85){
      ctx.fillStyle='rgba(255,100,0,.5)';ctx.beginPath();ctx.arc(ex,h-32,12,0,Math.PI*2);ctx.fill();
      ctx.fillStyle='rgba(255,50,0,.3)';ctx.beginPath();ctx.arc(ex,h-32,20,0,Math.PI*2);ctx.fill();
    }
    requestAnimationFrame(f);
  }
  requestAnimationFrame(f);
}

async function handleAvatarFile(input){

function resizeImage(file,maxW,maxH){return new Promise((resolve,reject)=>{
  const reader=new FileReader();reader.onload=function(e){
    const img=new Image();img.onload=function(){
      const canvas=document.createElement('canvas');let w=img.width,h=img.height;
      if(w>maxW||h>maxH){const ratio=Math.min(maxW/w,maxH/h);w*=ratio;h*=ratio}
      canvas.width=w;canvas.height=h;canvas.getContext('2d').drawImage(img,0,0,w,h);
      resolve(canvas.toDataURL('image/jpeg',0.85))};
    img.src=e.target.result};reader.readAsDataURL(file)})}

async function rogueEnterNode(nodeId){
  const er=await api('/api/rogue/enter_node',{node_id:nodeId});

  rogueRun=er.rogue_run;

  rogueRun=r.rogue_run;rogueBattle=r.battle||rogueBattle;
  const logEl=document.getElementById('rogue-battle-log');
  if(logEl&&r.logs){r.logs.forEach(l=>{logEl.innerHTML+='<div>'+l+'</div>'});logEl.scrollTop=logEl.scrollHeight}
  if(r.won||r.player_dead){
    if(r.won){
      const msg='💰+'+fmtNum(r.gold)+' ⭐+'+fmtNum(r.exp);
      addLog('🗼 胜利! '+msg);
      if(r.cards&&r.cards.length>0){showRogueCards(r.cards,'胜利! '+msg);return}
      showModal('✅ 胜利!',msg,'<button class="btn btn-c" onclick="closeModal();rogueShowMap()">继续</button>');
    }else{
      showModal('💀 失败',r.message||'止步于此','<button class="btn btn-c" onclick="closeModal();srogue()">返回</button>');
    }
  }else{
    renderRogueBattlePage();
    if(btn)btn.disabled=false;
  }
}

function showRogueCards(cards,title){
  title=title||'选择卡牌';let h='<h3>'+title+'</h3><div style="display:flex;gap:8px;flex-wrap:wrap;justify-content:center">';
  const qc={common:'#888',rare:'#00ff66',epic:'#cc44ff',legend:'#ff8800',mythic:'#ff3333'};
  cards.forEach(c=>{h+='<div class="card" style="cursor:pointer;border-color:'+qc[c.quality]+';width:140px" onclick="roguePickCard(\''+c.id+'\')"><b style="color:'+qc[c.quality]+'">'+c.name+'</b><br><span style="font-size:10px;color:var(--dim)">'+c.desc+'</span></div>'});
  h+='</div>';document.getElementById('mc').innerHTML=h;document.getElementById('mo').classList.add('sh');
}
async function roguePickCard(cid){await api('/api/rogue/pick_card',{card_id:cid});closeModal();rogueShowMap();}
async function rogueEventChoice(evtId,chId){const r=await api('/api/rogue/event_choice',{event_id:evtId,choice_id:chId});if(!r.ok){alert(r.error);return}rogueRun=r.rogue_run;closeModal();rogueShowMap();}
async function rogueItemClaim(itemId){const r=await api('/api/rogue/item_claim',{item_id:itemId});if(!r.ok){alert(r.error);return}rogueRun=r.rogue_run;closeModal();rogueShowMap();}
async function rogueShopBuy(itemId){const r=await api('/api/rogue/shop_buy',{item_id:itemId});if(!r.ok){alert(r.error);return}rogueRun=r.rogue_run;rogueShowMap();}
async function rogueShopLeave(){const r=await api('/api/rogue/shop_leave',{});rogueRun=r.rogue_run;rogueShowMap();}
async function rogueRest(action,cardId){const r=await api('/api/rogue/rest',{action:action,card_id:cardId||''});if(!r.ok){alert(r.error);return}rogueRun=r.rogue_run;rogueShowMap();}
async function rogueRetire(){await api('/api/rogue/retire',{});srogue();}
function showRogueEvent(evt){let h='<h3>❓ '+evt.title+'</h3><p style="color:var(--dim);font-size:11px">'+evt.desc+'</p>';evt.choices.forEach(c=>{h+='<button class="btn btn-c" style="margin:4px;width:100%" onclick="rogueEventChoice(\''+evt.id+'\',\''+c.id+'\')">'+c.text+'</button>'});document.getElementById('mc').innerHTML=h;document.getElementById('mo').classList.add('sh');}
function rogueShowShop(r){let h='<h3>🏪 交易所</h3><p style="font-size:10px">⚡'+(rogueRun.tokens||0)+'</p>';(r.shop_items||[]).forEach(si=>{const cl=si.cost_type==='tokens'?'⚡'+si.cost:'💰'+si.cost;h+='<div class="card" style="padding:6px;margin:4px;display:flex;justify-content:space-between"><span><b>'+si.name+'</b><br><span style="font-size:9px;color:var(--dim)">'+si.desc+'</span></span><button class="btn btn-c btn-sm" onclick="rogueShopBuy(\''+si.id+'\')">'+cl+'</button></div>'});h+='<button class="btn btn-r btn-sm" onclick="rogueShopLeave()" style="margin-top:6px">离开</button>';document.getElementById('mc').innerHTML=h;document.getElementById('mo').classList.add('sh');}
function rogueShowRest(r){let h='<h3>🔥 休息营地</h3>';(r.rest_options||[]).forEach(o=>{if(o.available===false)return;const onclick=o.effect==='upgrade_card'?"rogueRest('upgrade','"+((rogueRun.selected_cards||[])[0]?.id||'')+"')":"rogueRest('"+o.effect+"')";h+='<button class="btn btn-c" style="margin:4px;width:100%" onclick="'+onclick+'">'+o.text+'</button>'});document.getElementById('mc').innerHTML=h;document.getElementById('mo').classList.add('sh');}


// ═══════════════ 聊天+公告 ═══════════════
function escHtml(s){const d=document.createElement('div');d.textContent=s||'';return d.innerHTML}
async function loadChat(){const ch=document.getElementById("chat-ch")?document.getElementById("chat-ch").value:"world";const r=await api("/api/chat");var msgs=r.messages||[];msgs=msgs.filter(m=>ch=="all"||m.channel==ch);var h="";msgs.slice(-50).forEach(m=>{h+="<div style=\"padding:2px 0\"><b style=\"color:"+(m.is_bot?"var(--purple)":"var(--cyan)")+"\">"+(m.is_bot?"":"[我]")+escHtml(m.name)+"</b>: "+escHtml(m.msg)+"</div>"});var el=document.getElementById("chat-msgs");if(el){el.innerHTML=h||'<span style="color:var(--dim)">暂无消息</span>';el.scrollTop=el.scrollHeight}}
async function sendChat(){var inp=document.getElementById("chat-input");if(!inp||!inp.value.trim())return;const ch=document.getElementById("chat-ch")?.value||"world";await api("/api/chat/send",{msg:inp.value.trim(),channel:ch==="all"?"world":ch});inp.value="";loadChat()}
function toggleMobileChat(){const p=document.getElementById('chat-panel');const b=document.getElementById('btn-chat-toggle');if(!p||!b)return;const isCollapsed=p.classList.toggle('mobile-collapsed');b.textContent=isCollapsed?'▶':'▼';loadChat()}
async function loadAnnouncements(){const r=await api("/api/announcements");var anns=r.announcements||[];if(anns.length>0){var el=document.getElementById("announce-bar");if(el){el.style.display="block";el.textContent="📢 "+anns[anns.length-1].msg;el.title=anns.map(a=>a.msg).join(" | ")}}else{var el=document.getElementById("announce-bar");if(el){el.textContent="暂无公告";el.title=""}}}

// Auto-load announcements
setInterval(loadAnnouncements,25000);
setInterval(loadChat,15000);

document.addEventListener('keydown',e=>{if(cur==='battle'&&battle){if(e.key==='Enter'||e.key===' ')pa();if(e.key==='u'||e.key==='U')pul()}});
